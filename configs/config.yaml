# ──────────────────────────────────────────────
# AgenticSRE Configuration
# ──────────────────────────────────────────────

llm:
  api_key: "${LLM_API_KEY}"
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
  temperature: 0.1
  max_tokens: 8192
  timeout: 120

runtime:
  mode: "daemon"            # daemon | pipeline | rca | status
  log_level: "INFO"
  log_dir: "./logs"
  max_workers: 3
  enable_self_healing: false

kubernetes:
  namespace: "default"
  kubeconfig: ""            # empty = in-cluster or ~/.kube/config
  use_ssh: false            # true when running remotely, false on cluster node
  use_dry_run: true
  forbid_unsafe_commands:
    - "delete namespace"
    - "delete node"
    - "drain --force"
  ssh_jump_host: "openstack@222.200.180.102"
  ssh_target: "ubuntu@10.10.3.110"
  target_host: "ubuntu@10.10.3.110"

observability:
  backend: "alidata"               # "native" (Prometheus/ES/Jaeger) | "alidata" (Alibaba ARMS/SLS)
  alidata_env_file: ".env"        # .env path with AliData credentials (only for alidata backend)
  offline_mode: true             # true = alidata backend reads local problem_* data instead of Aliyun/MCP
  offline_data_dir: "data"
  offline_problem_id: "002"
  offline_data_type: "failure"    # auto | baseline | failure
  prometheus_url: "http://localhost:9090"
  elasticsearch_url: "http://localhost:9200"
  jaeger_url: "http://localhost:16686"
  grafana_url: "http://localhost:3000"

database:
  dsn: ""                   # optional: postgresql://...

mcp:
  external_servers: []
  # - name: "k8s-mcp"
  #   url: "http://localhost:8765/sse"

remediation:
  enabled: false
  confidence_threshold: 0.85
  max_rollback_depth: 5
  require_approval: true

memory:
  enabled: true
  backend: "chromadb"       # chromadb | json
  db_path: "./data/memory"
  embedding_model: "text-embedding-3-small"
  rules_collection: "sre_rules"
  faults_collection: "sre_faults"
  traces_collection: "sre_traces"
  max_similar_results: 5
  auto_learn: true
  judge_threshold: 0.65
  judge_llm_weight: 0.4

daemon:
  poll_interval_seconds: 30
  dedup_ttl_seconds: 300
  max_concurrent_pipelines: 3
  default_namespace: ""
  status_file: "./data/daemon_status.json"
  signal_history_size: 100

pipeline:
  max_evidence_iterations: 3
  hypothesis_confidence_threshold: 0.85
  enable_correlation: true
  enable_graph_rca: true
  enable_recovery: false

alert:
  compression_enabled: true
  time_window: 300          # seconds for alert grouping
  similarity_threshold: 0.8
  max_group_size: 50

detection:
  sources_enabled:
    prometheus: true
    k8s_event: true
    pod_health: true
    node_health: true
    metric_anomaly: true
  default_detect_methods: ["threshold", "zscore"]
  default_lookback_m: 30
  default_z_threshold: 3.0
  default_ewma_span: 10
  metric_checks:
    - name: "node_cpu_usage"
      query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[5m])) by (instance) * 100'
      unit: "%"
      label_key: "instance"
      level: "node"
      warn: 85
      crit: 95
      detect_methods: ["threshold", "zscore", "ewma"]
    - name: "node_memory_usage"
      query: '(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100'
      unit: "%"
      label_key: "instance"
      level: "node"
      warn: 85
      crit: 95
      detect_methods: ["threshold", "zscore"]
    - name: "node_disk_usage"
      query: '(1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100'
      unit: "%"
      label_key: "instance"
      level: "node"
      warn: 85
      crit: 95
    - name: "container_cpu"
      query: 'sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod, namespace) / sum(kube_pod_container_resource_limits{resource="cpu"}) by (pod, namespace) * 100'
      unit: "%"
      label_key: "pod"
      ns_key: "namespace"
      level: "container"
      warn: 80
      crit: 95
      detect_methods: ["threshold", "zscore", "ewma"]
    - name: "container_memory"
      query: 'sum(container_memory_working_set_bytes{container!=""}) by (pod, namespace) / sum(kube_pod_container_resource_limits{resource="memory"}) by (pod, namespace) * 100'
      unit: "%"
      label_key: "pod"
      ns_key: "namespace"
      level: "container"
      warn: 80
      crit: 95
  categories_enabled:
    infrastructure: true
    application: true
    business: true
    database: true
    k8s_workload: true
  business_services:
    - "nginx-thrift"
    - "nginx-web"
    - "compose-post"
    - "user-service"
    - "social-graph"
    - "home-timeline"
    - "user-timeline"
    - "post-storage"
    - "media-service"
    - "url-shorten"
    - "text-service"
  db_services:
    - "redis"
    - "memcached"
    - "mongodb"
    - "mongo"
    - "mysql"
    - "postgres"
    - "etcd"
  thresholds: {}
  critical_event_reasons:
    - "OOMKilling"
    - "NodeNotReady"
    - "EvictionThresholdMet"
  critical_pod_reasons:
    - "CrashLoopBackOff"
    - "OOMKilled"

observability_agent:
  trace_all_calls: true
  collect_token_usage: true
  collect_latency: true
  behavior_validation: true
  anomaly_threshold: 3.0    # z-score threshold for agent behavior anomaly

web:
  host: "0.0.0.0"
  port: 8080
  enable_cors: true

paradigm:
  default: "plan_and_execute"     # chain | react | reflection | plan_and_execute | debate | voting
  max_react_steps: 8              # max Thought→Action→Observation iterations for ReAct
  max_reflection_rounds: 2        # max critique→re-investigate rounds for Reflection
  debate_perspectives:            # perspectives for Debate paradigm
    - "infrastructure"
    - "application"
    - "holistic"
  voting_temperatures:            # LLM temperatures for Voting paradigm
    - 0.1
    - 0.5
    - 0.8

# ─── Domain Adaptation (跨系统泛化) ───
domain:
  active_profile: "kubernetes"    # kubernetes | generic_linux
  profiles_dir: ""                # empty = configs/domains/
  auto_detect: false              # auto-detect from environment (kubectl / systemctl)

# ─── Evolution Tracking (持续演化) ───
evolution:
  enabled: true
  snapshot_dir: ""                # empty = ./data/evolution/
  max_snapshots: 1000
  auto_record: true               # record evolution snapshot after each paradigm run
